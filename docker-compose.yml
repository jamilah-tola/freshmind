services:
  postgres:
    image: postgres:16-alpine
    container_name: freshmind-postgres
    environment:
      POSTGRES_USER: freshmind
      POSTGRES_PASSWORD: freshmind
      POSTGRES_DB: freshmind
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - freshmind-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshmind -d freshmind"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: freshmind-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  freshmind-postgres-data:
